<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MarcheMobility - Controllore</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #222; }
        h1 { color: #2e7d4f; }
        nav a { margin-right: 14px; color: #2e7d4f; }
        form { margin-top: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 16px; padding: 10px 18px; background: #2e7d4f; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 10px; margin-bottom: 8px; border-radius: 4px; }
        .messages .success { background: #d4edda; color: #155724; }
        .messages .error { background: #f8d7da; color: #721c24; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>MarcheMobility - Controllore</h1>
    <nav>
        <a href="{% url 'core:controller_home' %}">Home</a>
        <a href="{% url 'core:verify_ticket' %}">Verifica biglietto</a>
        <a href="{% url 'core:view_fines' %}">Visualizza multe</a>
        <a href="{% url 'core:controller_send_report' %}">Segnala anomalia</a>
        <a href="{% url 'core:controller_logout' %}">Logout</a>
    </nav>
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
