<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MarcheMobility - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #222; }
        h1 { color: #b02a37; }
        nav a { margin-right: 12px; color: #b02a37; font-size: 14px; }
        form { margin-top: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 16px; padding: 10px 18px; background: #b02a37; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 10px; margin-bottom: 8px; border-radius: 4px; }
        .messages .success { background: #d4edda; color: #155724; }
        .messages .error { background: #f8d7da; color: #721c24; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 14px; }
        th { background: #f0f0f0; }
        .action-btn { padding: 4px 8px; margin-right: 4px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>MarcheMobility - Admin</h1>
    <nav>
        <a href="{% url 'core:admin_home' %}">Home</a>
        <a href="{% url 'core:create_controller' %}">Crea controllore</a>
        <a href="{% url 'core:manage_users' %}">Gestione utenti</a>
        <a href="{% url 'core:manage_controllers' %}">Gestione controllori</a>
        <a href="{% url 'core:manage_routes' %}">Gestione corse</a>
        <a href="{% url 'core:manage_reports' %}">Segnalazioni</a>
        <a href="{% url 'core:send_notification' %}">Notifiche globali</a>
        <a href="{% url 'core:admin_logout' %}">Logout</a>
    </nav>
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
